# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests_python:
    name: Test on Python ${{ matrix.python_version }} and Django ${{ matrix.django_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        django_version: [ '4.2', '5.2', '6.0']
        python_version: [ '3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14' ]
        exclude:
          - django_version: '4.2'
            python_version: '3.13'

          - django_version: '4.2'
            python_version: '3.14'

          - django_version: '5.2'
            python_version: '3.8'

          - django_version: '5.2'
            python_version: '3.9'

          - django_version: '6.0'
            python_version: '3.8'

          - django_version: '6.0'
            python_version: '3.9'

          - django_version: '6.0'
            python_version: '3.10'

          - django_version: '6.0'
            python_version: '3.11'

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python_version }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        # This path is specific to Ubuntu
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.django_version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -U -r dev-requirements.txt
        pip install -U Django~=${{ matrix.django_version }}
    - name: isort
      run: |
        isort tracking_fields --profile black --skip migrations
    - name: Lint with black
      run: |
        black tracking_fields --exclude "migrations"
    - name: Lint with flake8
      run: |
        flake8 --ignore=E501,W504 tracking_fields
    - name: Test Django
      run: |
        python -W error::DeprecationWarning -W error::PendingDeprecationWarning runtests.py --fast --coverage
    - name: Coverage
      if: ${{ success() }}
      run: |
        coveralls
